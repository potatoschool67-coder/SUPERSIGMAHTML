<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xhtml="http://www.w3.org/1999/xhtml" width="100%" height="100%" viewBox="0 0 1920 1080">
  <foreignObject id="fo" width="1920" height="1080" x="0" y="0">
    <xhtml:html xmlns="http://www.w3.org/1999/xhtml" style="width:100%;height:100%;margin:0;padding:0;">
    <xhtml:head>
      <xhtml:style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
          width: 100%; height: 100%; overflow: hidden;
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
          background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
          color: #e0e0e0;
        }
        .container {
          display: flex; flex-direction: column; align-items: center; justify-content: center;
          width: 100%; height: 100%; padding: 40px;
        }
        .card {
          width: 100%; max-width: 900px; height: 100%;
          display: flex; flex-direction: column;
          background: rgba(255,255,255,0.05);
          border-radius: 16px; padding: 32px;
          backdrop-filter: blur(12px);
          box-shadow: 0 8px 32px rgba(0,0,0,0.4);
          border: 1px solid rgba(255,255,255,0.08);
        }
        h1 {
          font-size: 24px; font-weight: 700; text-align: center;
          margin-bottom: 20px; letter-spacing: 0.5px;
          background: linear-gradient(135deg, #e0e0e0, #7ec8e3);
          -webkit-background-clip: text; -webkit-text-fill-color: transparent;
          background-clip: text;
        }
        textarea {
          flex: 1; min-height: 200px; width: 100%;
          background: #0d1117; color: #c9d1d9;
          border: 1px solid rgba(255,255,255,0.1);
          border-radius: 10px; padding: 16px;
          font-family: 'Cascadia Code', 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
          font-size: 14px; line-height: 1.6; resize: none; outline: none;
          transition: border-color 0.2s;
        }
        textarea:focus { border-color: #58a6ff; }
        textarea::placeholder { color: #484f58; }
        .button-row {
          display: flex; gap: 12px; margin-top: 16px; justify-content: center;
        }
        button {
          padding: 12px 36px; border: none; border-radius: 10px;
          font-size: 16px; font-weight: 600; cursor: pointer;
          transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
        }
        button:active { transform: scale(0.97); }
        .btn-open {
          background: linear-gradient(135deg, #238636, #2ea043);
          color: #fff; box-shadow: 0 4px 16px rgba(35,134,54,0.35);
        }
        .btn-open:hover { box-shadow: 0 6px 24px rgba(35,134,54,0.5); }
        .btn-clear {
          background: rgba(255,255,255,0.08); color: #c9d1d9;
          border: 1px solid rgba(255,255,255,0.12);
        }
        .btn-clear:hover { background: rgba(255,255,255,0.14); }
        .status {
          text-align: center; margin-top: 12px; font-size: 13px;
          min-height: 20px; color: #f85149; transition: opacity 0.3s;
        }
      </xhtml:style>
    </xhtml:head>
    <xhtml:body>
      <div class="container">
        <div class="card">
          <h1>HTML Viewer</h1>
          <textarea id="code" placeholder="Paste your HTML code here..."></textarea>
          <div class="button-row">
            <button class="btn-open" id="btnOpen">Open</button>
            <button class="btn-clear" id="btnClear">Clear</button>
          </div>
          <div class="status" id="status"></div>
        </div>
      </div>
      <xhtml:script>
      //<![CDATA[
        (function() {
          function size() {
            var w = window.innerWidth, h = window.innerHeight;
            var svg = document.querySelector('svg');
            var fo  = document.getElementById('fo');
            if (svg) { svg.setAttribute('width', w); svg.setAttribute('height', h); svg.setAttribute('viewBox','0 0 '+w+' '+h); }
            if (fo)  { fo.setAttribute('width', w);  fo.setAttribute('height', h); }
          }
          size();
          window.addEventListener('resize', size);

          var code = document.getElementById('code');
          var btnOpen = document.getElementById('btnOpen');
          var btnClear = document.getElementById('btnClear');
          var status = document.getElementById('status');

          function setStatus(msg, isError) {
            status.textContent = msg;
            status.style.color = isError ? '#f85149' : '#7ec8e3';
          }

          btnOpen.addEventListener('click', function() {
            var html = code.value.trim();
            if (!html) {
              setStatus('Paste some HTML code first', true);
              return;
            }
            setStatus('', false);
            var win = window.open('about:blank', '_blank');
            if (!win) {
              setStatus('Popup blocked! Please allow popups and try again.', true);
              return;
            }
            win.document.open();
            win.document.write(html);
            win.document.close();
          });

          btnClear.addEventListener('click', function() {
            code.value = '';
            code.focus();
            setStatus('', false);
          });

          document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
              btnOpen.click();
            }
          });
        })();
      //]]>
      </xhtml:script>
    </xhtml:body>
    </xhtml:html>
  </foreignObject>
</svg>
